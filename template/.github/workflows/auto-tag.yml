name: Auto tag

# Reads version from wick.yml on every push to main/master.
# Creates and pushes a semver tag if it doesn't exist yet,
# which triggers release.yml to build and publish.
on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  tag:
    name: Tag if version changed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from wick.yml
        id: ver
        run: |
          VERSION=$(grep '^version:' wick.yml | awk '{print $2}' | tr -d '"'"'"' ')
          if [ -z "$VERSION" ]; then
            echo "No version: field in wick.yml — skipping." >&2
            exit 1
          fi
          TAG="v${VERSION#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Push tag if new
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if git ls-remote --tags origin "$TAG" | grep -q .; then
            echo "Tag $TAG already exists — skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Pushed $TAG → release.yml will run."
          fi
